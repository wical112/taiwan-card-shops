/* ---- region 由 city 推導 ---- */
function regionOf(city){
  if(/台北|臺北|新北/.test(city)) return "台北・新北";
  if(/桃園|新竹/.test(city))      return "桃園・新竹";
  if(/台中|臺中/.test(city))      return "台中";
  if(/台南|臺南/.test(city))      return "台南";
  if(/高雄/.test(city))           return "高雄";
  return "其他";
}
const TYPE_LABEL={pokemon:"寶可夢 PTCG",onepiece:"One Piece",both:"兩款都有"};

/* ---- state ---- */
let fType="all", fRegion="all", fQ="", fVerified=false, userPos=null;
const FKEY="tcsFilters";
function saveFilters(){
  lsSet(FKEY,JSON.stringify({fType,fRegion,fQ,fVerified}));
}
function restoreFilters(){
  let o; try{o=JSON.parse(lsGet(FKEY)||"null");}catch(e){o=null;}
  if(!o) return;
  fType=o.fType||"all"; fRegion=o.fRegion||"all";
  fQ=o.fQ||""; fVerified=!!o.fVerified;
  const press=(box,attr,val)=>{
    const b=document.getElementById(box); if(!b)return;
    [...b.children].forEach(c=>c.setAttribute("aria-pressed",
      String(c.dataset[attr]===val)));
  };
  press("typeChips","type",fType);
  press("regionChips","region",fRegion);
  const q=document.getElementById("q"); if(q) q.value=fQ;
  const v=document.getElementById("verBtn");
  if(v) v.setAttribute("aria-pressed",String(fVerified));
}
const CONF_RANK={high:0,medium:1,low:2};
/* localStorage 防爆（Safari 無痕舊版 getItem/setItem 會 throw） */
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

/* ---- distance (haversine, km) ---- */
function distKm(a,b,c,d){
  const R=6371,r=Math.PI/180;
  const x=Math.sin((c-a)*r/2)**2 +
          Math.cos(a*r)*Math.cos(c*r)*Math.sin((d-b)*r/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

/* ---- map links（iPhone 優先 Apple Maps）---- */
function appleLink(s){
  const q=encodeURIComponent(s.name+" "+s.address);
  return "https://maps.apple.com/?daddr="+q;          // 直接由現在位置帶路
}
function gmapLink(s){
  const q=encodeURIComponent(s.name+" "+s.address);
  return "https://www.google.com/maps/dir/?api=1&destination="+q;
}

/* ---- filtering ---- */
function visibleShops(){
  let arr=SHOPS.filter(s=>{
    if(fType==="pokemon"  && !(s.type==="pokemon"  || s.type==="both")) return false;
    if(fType==="onepiece" && !(s.type==="onepiece" || s.type==="both")) return false;
    if(fType==="both"     && s.type!=="both") return false;
    if(fVerified && !s.verified_2026) return false;
    if(fRegion!=="all" && regionOf(s.city)!==fRegion) return false;
    if(fQ){
      const hay=(s.name+" "+s.address+" "+(s.area||"")+" "+(s.events||"")+" "+s.city).toLowerCase();
      if(!hay.includes(fQ.toLowerCase())) return false;
    }
    return true;
  });
  if(userPos){
    arr.forEach(s=>{ s._d = (s.lat!=null&&s.lng!=null)
      ? distKm(userPos.lat,userPos.lng,s.lat,s.lng) : Infinity; });
    arr.sort((a,b)=>a._d-b._d);
  }else{
    // 未定位：2026 已確認賽事優先，再按資料信心
    arr.sort((a,b)=>
      (b.verified_2026?1:0)-(a.verified_2026?1:0) ||
      (CONF_RANK[a.confidence]??3)-(CONF_RANK[b.confidence]??3));
  }
  return arr;
}

/* ---- render list ---- */
const listEl=document.getElementById("list");
const statusEl=document.getElementById("status");
function esc(t){return (t||"").replace(/[&<>"]/g,m=>(
  {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}

function render(){
  const arr=visibleShops();
  const total=SHOPS.length, vAll=SHOPS.filter(s=>s.verified_2026).length;
  statusEl.innerHTML = userPos
    ? `已定位 · 顯示 <b>${arr.length}</b> 間（共 ${total}），最近排最前`
    : `共 <b>${total}</b> 間 · 其中 <b>${vAll}</b> 間 2026 官方賽事已確認 · 顯示 <b>${arr.length}</b> 間 · 撳「📍 搵最近」按距離排`;

  const bn=document.getElementById("opBanner");
  if(bn){
    const dismissed=lsGet("opBannerX")==="1";
    const relevant=(fType==="all"||fType==="onepiece");
    bn.style.display=(!dismissed && relevant)?"":"none";
  }

  if(!arr.length){
    listEl.innerHTML='<div class="empty">冇符合條件嘅卡店<br>試下放寬篩選<br><button class="lnk-clear" id="clrF">清除全部篩選</button></div>';
  }else{
    listEl.innerHTML=arr.map((s,i)=>{
      const tcls=s.type, near=(userPos&&i===0&&s._d!==Infinity);
      const dist=(userPos&&s._d!==Infinity)
        ? `<span class="tag dist">📍 ${s._d<1?(s._d*1000).toFixed(0)+" m":s._d.toFixed(1)+" km"}${near?" · 最近":""}</span>`:"";
      const conf=s.confidence==="low"
        ? ' <span class="addr-flag">· 地址待核</span>':"";
      const evt=s.verified_2026
        ? '<span class="tag evt-yes">✅ 2026 官方賽事</span>'
        : '<span class="tag evt-no">⚠️ 賽程待確認</span>';
      const src=(s.sources&&s.sources.length)
        ? `<div class="src">${s.sources.slice(0,2).map((u,n)=>
            `<a href="${esc(u)}" target="_blank" rel="noopener">來源${n+1}</a>`).join(" · ")}</div>`:"";
      return `<div class="card t-${tcls}">
        <div class="nm">${esc(s.name)}</div>
        <div class="badges">
          <span class="tag ${tcls==='pokemon'?'pk':tcls==='onepiece'?'op':'both'}">${TYPE_LABEL[s.type]}</span>
          ${evt}${dist}
        </div>
        ${s.events?`<div class="evt">🏆 <b>賽事</b>：${esc(s.events)}</div>`:""}
        <div class="addr">📮 ${esc(s.address)}${conf}</div>
        ${s.note?`<div class="note">${esc(s.note)}</div>`:""}
        <div class="acts">
          <a class="nav-apple" href="${appleLink(s)}">🧭 Apple 地圖導航</a>
          <a class="nav-g" href="${gmapLink(s)}" target="_blank" rel="noopener">Google Maps</a>
          ${(s.lat!=null&&s.lng!=null)?`<button class="nav-map" data-k="${SHOPS.indexOf(s)}" aria-label="喺地圖睇 ${esc(s.name)}">🗺️</button>`:""}
        </div>
        ${src}
      </div>`;
    }).join("");
  }
  if(mapReady) drawMarkers(arr);
}

/* ---- chip wiring ---- */
function wireChips(id,set){
  const box=document.getElementById(id);
  box.addEventListener("click",e=>{
    const b=e.target.closest(".chip"); if(!b)return;
    [...box.children].forEach(c=>c.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    set(b.dataset.type||b.dataset.region); render(); saveFilters();
  });
}
wireChips("typeChips",v=>fType=v);
wireChips("regionChips",v=>fRegion=v);
document.getElementById("q").addEventListener("input",e=>{
  fQ=e.target.value.trim(); render(); saveFilters();
});
const verBtn=document.getElementById("verBtn");
verBtn.addEventListener("click",()=>{
  fVerified=!fVerified;
  verBtn.setAttribute("aria-pressed",String(fVerified));
  render(); saveFilters();
});

function clearFilters(){
  fType="all"; fRegion="all"; fQ=""; fVerified=false;
  const q=document.getElementById("q"); if(q) q.value="";
  const reset=box=>{const b=document.getElementById(box);
    [...b.children].forEach((c,i)=>c.setAttribute("aria-pressed",String(i===0)));};
  reset("typeChips"); reset("regionChips");
  verBtn.setAttribute("aria-pressed","false");
  render(); saveFilters();
}
listEl.addEventListener("click",e=>{

/* ---- geolocation（#9 重訪自動定位 / #12 邊行邊更新）---- */
const locBtn=document.getElementById("locBtn"),
      watchBtn=document.getElementById("watchBtn");
let watchId=null;
function updateUserMarker(){
  if(!(mapReady&&map))return;
  if(window._um) map.removeLayer(window._um);
  window._um=L.circleMarker([userPos.lat,userPos.lng],
    {radius:8,color:"#fff",weight:2,fillColor:"#6f5fd6",fillOpacity:1})
    .addTo(map).bindPopup("你喺呢度");
}
function applyPos(p,recenter){
  userPos={lat:p.coords.latitude,lng:p.coords.longitude};
  updateUserMarker();
  if(recenter&&mapReady&&map) map.setView([userPos.lat,userPos.lng],13);
  render();
}
function locate(opts){
  opts=opts||{};
  if(!navigator.geolocation){ if(!opts.silent)alert("此裝置唔支援定位"); return; }
  locBtn.disabled=true; locBtn.textContent="📍 定位中…";
  navigator.geolocation.getCurrentPosition(p=>{
    applyPos(p,true);
    locBtn.textContent="📍 已定位"; locBtn.disabled=false;
  },err=>{
    locBtn.textContent="📍 搵最近"; locBtn.disabled=false;
    if(!opts.silent) alert("定位失敗："+
      (err.code===1?"請喺設定允許位置權限":"暫時取唔到位置"));
  },{enableHighAccuracy:true,timeout:10000,maximumAge:60000});
}
locBtn.addEventListener("click",()=>locate());
watchBtn.addEventListener("click",()=>{
  const on=watchBtn.getAttribute("aria-pressed")!=="true";
  watchBtn.setAttribute("aria-pressed",String(on));
  if(on){
    if(!navigator.geolocation){alert("此裝置唔支援定位");
      watchBtn.setAttribute("aria-pressed","false");return;}
    locBtn.textContent="📍 持續定位中";
    watchId=navigator.geolocation.watchPosition(
      p=>applyPos(p,false),()=>{},
      {enableHighAccuracy:true,maximumAge:15000,timeout:15000});
  }else if(watchId!=null){
    navigator.geolocation.clearWatch(watchId); watchId=null;
    locBtn.textContent="📍 已定位";
  }
});

/* ---- tabs ---- */
const tabList=document.getElementById("tabList"),
      tabMap=document.getElementById("tabMap"),
      mapWrap=document.getElementById("mapWrap");
tabList.addEventListener("click",()=>switchTab("list"));
tabMap.addEventListener("click",()=>switchTab("map"));
function switchTab(t){
  const isMap=t==="map";
  tabList.setAttribute("aria-selected",!isMap);
  tabMap.setAttribute("aria-selected",isMap);
  listEl.classList.toggle("hide",isMap);
  statusEl.classList.toggle("hide",isMap);
  mapWrap.classList.toggle("hide",!isMap);
  if(isMap) ensureMap();
}

/* ---- Leaflet map (lazy + offline-safe) ---- */
let map=null, mapReady=false, markerLayer=null,
    markerByKey={}, pendingFocus=null;
function focusMarker(k){
  const m=markerByKey[k]; if(!m)return false;
  map.setView(m.getLatLng(),16,{animate:true}); m.openPopup(); return true;
}
function showOnMap(k){
  switchTab("map");
  if(mapReady && focusMarker(k)) return;
  pendingFocus=k;            // 地圖未 ready，drawMarkers 後再 focus
}
function ensureMap(){
  if(mapReady) { setTimeout(()=>map&&map.invalidateSize(),60); return; }
  if(typeof L==="undefined"){
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js";
    s.onload=initMap;
    s.onerror=()=>{document.getElementById("map").innerHTML=
      '<div class="maperr">⚠️ 地圖需要網路先載入到<br>而家可以用「📋 清單」— 離線都用到，撳「導航」一樣去到</div>';};
    document.head.appendChild(s);
  }else initMap();
}
function initMap(){
  if(window.__noLeafletCss){
    const l=document.createElement("link");l.rel="stylesheet";
    l.href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css";
    document.head.appendChild(l);
  }
  map=L.map("map",{zoomControl:true}).setView([23.7,121],7);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {maxZoom:19,attribution:"© OpenStreetMap"}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);
  mapReady=true;
  if(userPos){
    window._um=L.circleMarker([userPos.lat,userPos.lng],
      {radius:8,color:"#fff",weight:2,fillColor:"#6f5fd6",fillOpacity:1})
      .addTo(map).bindPopup("你喺呢度");
  }
  drawMarkers(visibleShops());
  setTimeout(()=>map.invalidateSize(),60);
}
const TYPE_COLOR={pokemon:"#ef5b58",onepiece:"#4a8fe0",both:"#2eb583"};
function drawMarkers(arr){
  if(!markerLayer)return;
  markerLayer.clearLayers();
  markerByKey={};
  const pts=[];
  arr.forEach(s=>{
    if(s.lat==null||s.lng==null)return;
    pts.push([s.lat,s.lng]);
    const mk=L.circleMarker([s.lat,s.lng],{radius:8,color:"#fff",weight:1.5,
      fillColor:TYPE_COLOR[s.type],fillOpacity:.95})
      .addTo(markerLayer)
      .bindPopup(`<div class="pp"><div class="pp-nm">${esc(s.name)}</div>
        <div class="pp-ad">${esc(s.address)}</div>
        <a href="${appleLink(s)}">Apple 地圖</a>
        <a class="g" href="${gmapLink(s)}" target="_blank" rel="noopener">Google</a></div>`);
    markerByKey[SHOPS.indexOf(s)]=mk;
  });
  if(pendingFocus!=null && markerByKey[pendingFocus]){
    focusMarker(pendingFocus); pendingFocus=null;
  }else if(pts.length && !userPos){
    try{map.fitBounds(pts,{padding:[30,30],maxZoom:13});}catch(e){}
  }
}

/* ---- init ---- */
document.getElementById("meta").textContent =
  `資料更新：${DATA_UPDATED} · 官方賽事主辦店 ${SHOPS.length} 間（${SHOPS.filter(s=>s.verified_2026).length} 間2026已核實）· 為朋友台灣行程而製`;

const bnX=document.getElementById("bnX");
if(bnX) bnX.addEventListener("click",()=>{
  lsSet("opBannerX","1");
  const bn=document.getElementById("opBanner"); if(bn) bn.style.display="none";
});

/* 動態量 header 實高 → #map 高度準（header 行數會變） */
const hdrEl=document.querySelector("header");
function syncHdr(){
  if(hdrEl) document.documentElement.style.setProperty(
    "--hdr", hdrEl.offsetHeight + "px");
}
syncHdr();
addEventListener("resize",syncHdr);
addEventListener("orientationchange",()=>setTimeout(syncHdr,200));

restoreFilters();          // #6 重開沿用上次篩選
render();

/* #9 重訪自動定位：已授權過就唔使再撳「搵最近」 */
if(navigator.permissions&&navigator.permissions.query){
  navigator.permissions.query({name:"geolocation"})
    .then(r=>{ if(r.state==="granted") locate({silent:true}); })
    .catch(()=>{});
}

/* PWA：註冊 service worker（離線即開 + tile 快取）。file:// 會靜默跳過 */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  addEventListener("load",()=>navigator.serviceWorker
    .register("sw.js").catch(()=>{}));
}
</script>
</body>
